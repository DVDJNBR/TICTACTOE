<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f1115"/>
  <g transform="translate(15, 15)">
    <!-- 'X' in cyan with glow -->
    <path d="M 10 10 L 30 30 M 30 10 L 10 30" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" fill="none" filter="drop-shadow(0 0 4px #00d4ff)"/>

    <!-- 'O' in vibrant orange with glow -->
    <rect x="40" y="40" width="20" height="20" rx="5" stroke="#ff6600" stroke-width="6" fill="none" filter="drop-shadow(0 0 4px #ff6600)"/>
  </g>
</svg>
