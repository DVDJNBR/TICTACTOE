<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe vs AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❌</text></svg>">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <!-- Removed subtitle "Can you beat the AI?" as requested -->

        <div id="status" class="status">Initializing...</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="restart" class="restart-btn">Restart Game</button>

        <div class="footer-controls">
            <a href="https://github.com/DVDJNBR/TICTACTOE" target="_blank" class="github-btn" aria-label="View Source on GitHub">Source Code</a>
            <div class="help-container">
                <span class="help-icon">?</span>
                <div class="tooltip">
                    <h3>How to Play</h3>
                    <ul>
                        <li>You are assigned X or O randomly.</li>
                        <li>Click empty cells to make a move.</li>
                        <li>Get 3 in a row to win.</li>
                        <li>The AI uses Minimax and is unbeatable!</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
