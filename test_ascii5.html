<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
    color: black;
  }
  .board-container {
    position: relative;
    display: inline-block;
  }
  pre {
    margin: 0;
    font-family: monospace;
    font-size: 2.5rem;
    line-height: 1.5; /* Good spacing for terminal */
    white-space: pre;
    text-align: center;
    color: #000;
  }
  .grid-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: grid;
    /* Divide the pre string block evenly into a 3x5 grid */
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
    z-index: 10;
  }
  .cell {
    /* border: 1px solid rgba(255,0,0,0.2); Just for testing alignment */
    cursor: pointer;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2.2rem; /* Make emoji slightly smaller so it doesn't shift lines */
    color: black; /* Emoji color */
    line-height: 1;
  }
  /* Position cells correctly in the 3x5 grid on rows 1, 3, and 5 */
  .cell:nth-child(-n+3) { grid-row: 1; }
  .cell:nth-child(n+4):nth-child(-n+6) { grid-row: 3; }
  .cell:nth-child(n+7) { grid-row: 5; }
</style>
</head>
<body>
<div class="board-container">
<!-- Let's try pure ASCII characters. `|` for vertical, `_` for horizontal. -->
<pre id="ascii-board">
   |   |
___|___|___
   |   |
___|___|___
   |   |
</pre>
<div class="grid-overlay">
  <div class="cell">❌</div><div class="cell">⭕</div><div class="cell"></div>
  <div class="cell"></div><div class="cell">❌</div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell">⭕</div>
</div>
</div>
</body>
</html>
