<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 40px;
    height: 100vh;
    background: white;
    color: black;
  }
  pre {
    margin: 0;
    font-family: monospace;
    font-size: 32px;
    line-height: 1; /* Try 1 to see if they connect */
    white-space: pre;
    text-align: center;
  }
</style>
</head>
<body>
<div>
  <h3>Standard ASCII</h3>
<pre>
 X | O |
---|---|---
   | X |
---|---|---
   |   | O
</pre>
</div>
<div>
  <h3>Box Drawing (Light)</h3>
<pre>
 X │ O │
───┼───┼───
   │ X │
───┼───┼───
   │   │ O
</pre>
</div>
<div>
  <h3>Box Drawing (Heavy)</h3>
<pre>
 X ┃ O ┃
━━━╋━━━╋━━━
   ┃ X ┃
━━━╋━━━╋━━━
   ┃   ┃ O
</pre>
</div>
<div>
  <h3>Dashed Vertical (┊)</h3>
<pre>
 X ┊ O ┊
---┊---┊---
   ┊ X ┊
---┊---┊---
   ┊   ┊ O
</pre>
</div>
</body>
</html>
